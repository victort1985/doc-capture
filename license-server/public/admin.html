<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vixor License Admin</title>
<style>
  :root{ --navy:#0e1642; --orange:#F2701C; --ink:#15191c; --ink-soft:#5c665f; --paper:#f5f6fa; --line:#e2e5ee; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:system-ui,sans-serif; background:var(--paper); color:var(--ink); }
  header{ background:var(--navy); color:#fff; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
  header b{ color:var(--orange); }
  .wrap{ max-width:900px; margin:0 auto; padding:24px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:16px; }
  input{ padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; width:100%; margin-bottom:10px; }
  button{ background:var(--navy); color:#fff; border:none; padding:9px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
  button.danger{ background:#b3261e; }
  button.ghost{ background:transparent; color:var(--navy); border:1px solid var(--line); }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
  th{ color:var(--ink-soft); font-size:11px; text-transform:uppercase; }
  code{ font-family:ui-monospace,monospace; font-size:11.5px; background:var(--paper); padding:2px 5px; border-radius:4px; }
  .status-active{ color:#1a7a3c; font-weight:700; }
  .status-revoked{ color:#b3261e; font-weight:700; }
  .hidden{ display:none; }
  .stale{ color:#c95c11; }
</style>
</head>
<body>

<header>
  <span>VIXOR <b>LICENSE ADMIN</b></span>
  <button id="logoutBtn" class="ghost hidden" style="color:#fff;border-color:rgba(255,255,255,.3)">Sign out</button>
</header>

<div class="wrap">
  <div id="loginCard" class="card" style="max-width:360px;">
    <h3 style="margin-top:0">Sign in</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Sign in</button>
    <div id="loginError" style="color:#b3261e;font-size:13px;margin-top:8px;"></div>
  </div>

  <div id="mainArea" class="hidden">
    <div class="card">
      <h3 style="margin-top:0">New license</h3>
      <input id="newCustomer" placeholder="Customer name">
      <input id="newNotes" placeholder="Notes (optional)">
      <button onclick="createLicense()">Generate key</button>
      <div id="newKeyResult" style="margin-top:12px;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Licenses</h3>
      <table>
        <thead><tr><th>Customer</th><th>Key</th><th>Status</th><th>Last check</th><th></th></tr></thead>
        <tbody id="licenseRows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('vixor-license-admin-token');

function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(opts.headers || {}) },
  }).then(async r => {
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(body.error || `Request failed (${r.status})`);
    return body;
  });
}

function showLoggedIn() {
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('mainArea').classList.remove('hidden');
  document.getElementById('logoutBtn').classList.remove('hidden');
  loadLicenses();
}

async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent = '';
  try {
    const res = await api('/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    token = res.token;
    localStorage.setItem('vixor-license-admin-token', token);
    showLoggedIn();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
  }
}

document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('vixor-license-admin-token');
  location.reload();
};

async function createLicense() {
  const customerName = document.getElementById('newCustomer').value.trim();
  const notes = document.getElementById('newNotes').value.trim();
  if (!customerName) return;
  try {
    const lic = await api('/admin/licenses', { method: 'POST', body: JSON.stringify({ customerName, notes }) });
    document.getElementById('newKeyResult').innerHTML =
      `Key for <b>${lic.customer_name}</b>:<br><code style="font-size:13px;">${lic.key}</code>`;
    document.getElementById('newCustomer').value = '';
    document.getElementById('newNotes').value = '';
    loadLicenses();
  } catch (e) { alert(e.message); }
}

function timeAgo(iso) {
  if (!iso) return '<span class="stale">never</span>';
  const days = (Date.now() - new Date(iso).getTime()) / 86400000;
  const label = days < 1 ? 'today' : days < 2 ? '1 day ago' : `${Math.floor(days)} days ago`;
  return days >= 2 ? `<span class="stale">${label}</span>` : label;
}

async function loadLicenses() {
  const rows = await api('/admin/licenses');
  document.getElementById('licenseRows').innerHTML = rows.map(l => `
    <tr>
      <td>${l.customer_name}${l.notes ? `<div style="color:var(--ink-soft);font-size:11px">${l.notes}</div>` : ''}</td>
      <td><code>${l.key.slice(0, 12)}…</code></td>
      <td class="status-${l.status}">${l.status}</td>
      <td>${timeAgo(l.last_checked_at)}</td>
      <td>
        ${l.status === 'active'
          ? `<button class="danger" onclick="revoke(${l.id})">Revoke</button>`
          : `<button onclick="reactivate(${l.id})">Reactivate</button>`}
      </td>
    </tr>
  `).join('');
}

async function revoke(id) {
  if (!confirm('Revoke this license? The client will lock out per the grace-period timeline.')) return;
  await api(`/admin/licenses/${id}/revoke`, { method: 'POST' });
  loadLicenses();
}
async function reactivate(id) {
  await api(`/admin/licenses/${id}/reactivate`, { method: 'POST' });
  loadLicenses();
}

if (token) showLoggedIn();
</script>
</body>
</html>
