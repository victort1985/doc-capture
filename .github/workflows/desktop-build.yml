name: Desktop Build (Electron)

on:
  push:
    tags: ['v*']

defaults:
  run:
    working-directory: desktop-client

jobs:
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Build Windows
        shell: pwsh
        run: |
          $ep = node -e "console.log(require('electron'))" 2>$null
          if ($ep) {
            $env:ELECTRON_OVERRIDE_DIST_PATH = Split-Path $ep
            Write-Host "Using electron at: $env:ELECTRON_OVERRIDE_DIST_PATH"
          }
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Upload to GitHub Release
        if: success()
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem desktop-client/dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; exit 1 }
          $size = [math]::Round($exe.Length/1MB,1)
          Write-Host "✅ $($exe.Name) — $size MB"
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title "Vixor ERP $tag" --notes "Auto-built" 2>$null
          gh release upload $tag "$($exe.FullName)" --clobber --repo "${{ github.repository }}"
          Write-Host "✅ Uploaded to GitHub Release $tag" 

  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .icns
        run: |
          mkdir -p VixorERP.iconset
          for sz in 16 32 128 256 512; do
            cp assets/icon_${sz}.png VixorERP.iconset/icon_${sz}x${sz}.png
          done
          iconutil -c icns VixorERP.iconset -o assets/icon.icns 2>/dev/null \
            || sips -s format icns assets/icon.png --out assets/icon.icns || true

      - name: npm install
        run: npm install

      - name: Build macOS
        run: |
          ELECTRON_PATH=$(node -e "console.log(require('electron'))" 2>/dev/null || echo "")
          if [ -n "$ELECTRON_PATH" ]; then
            export ELECTRON_OVERRIDE_DIST_PATH=$(dirname "$ELECTRON_PATH")
            echo "Using electron at: $ELECTRON_OVERRIDE_DIST_PATH"
          fi
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Upload to GitHub Release
        if: success()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find desktop-client/dist -name "*.dmg" | head -1)
          [ -z "$DMG" ] && echo "No DMG found" && exit 1
          echo "✅ $DMG ($(du -sh "$DMG" | cut -f1))"
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --title "Vixor ERP $TAG" --notes "Auto-built" 2>/dev/null || true
          gh release upload "$TAG" "$DMG" --clobber --repo ${{ github.repository }}
          echo "✅ Uploaded to GitHub Release $TAG" 

  build-linux:
    name: Linux (tar.gz bundle)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Build Linux
        run: |
          # Use already-downloaded electron from npm (avoids re-download)
          ELECTRON_PATH=$(node -e "console.log(require('electron'))" 2>/dev/null || echo "")
          if [ -n "$ELECTRON_PATH" ]; then
            export ELECTRON_OVERRIDE_DIST_PATH=$(dirname "$ELECTRON_PATH")
            echo "Using electron at: $ELECTRON_OVERRIDE_DIST_PATH"
          fi
          npm run build:linux 2>&1 | tee /tmp/build-linux.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Save build log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B debug-electron-linux2
          cp /tmp/build-linux.log electron-build-error.txt 2>/dev/null || echo "npm install failed" > electron-build-error.txt
          git add -f electron-build-error.txt
          git commit -m "debug: electron linux error"
          git push --force origin debug-electron-linux2 || true

      - name: Package & upload via curl (no gh CLI, no Azure)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # Find build dir
          DIR=$(find desktop-client/dist -maxdepth 3 -type d -name "*unpacked*" 2>/dev/null | head -1)
          [ -z "$DIR" ] && DIR=$(find desktop-client/dist -maxdepth 2 -mindepth 1 -type d 2>/dev/null | head -1)
          echo "Build dir: ${DIR:-NOT FOUND}"
          echo "Dist listing:"; ls desktop-client/dist/ 2>/dev/null
          [ -z "$DIR" ] && exit 1
          
          # Create tar.gz
          tar -czf vixor-erp-linux-x64.tar.gz -C "$DIR" .
          SIZE=$(stat -c%s vixor-erp-linux-x64.tar.gz)
          echo "✅ Package: $(du -sh vixor-erp-linux-x64.tar.gz | cut -f1)"
          
          # Create release via REST API (api.github.com — works fine)
          RELEASE=$(curl -s -X POST             -H "Authorization: token $GH_TOKEN"             -H "Content-Type: application/json"             "https://api.github.com/repos/$REPO/releases"             -d "{"tag_name":"$TAG","name":"Vixor ERP $TAG","body":"Desktop builds","draft":false}"             2>/dev/null)
          RELEASE_ID=$(echo "$RELEASE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          
          # If release exists, get its ID
          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN"               "https://api.github.com/repos/$REPO/releases/tags/$TAG" 2>/dev/null |               python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          fi
          
          echo "Release ID: $RELEASE_ID"
          [ -z "$RELEASE_ID" ] && echo "Failed to get release ID" && exit 1
          
          # Upload asset via REST API (uploads.github.com — not Azure)
          UPLOAD_RESULT=$(curl -s -X POST             -H "Authorization: token $GH_TOKEN"             -H "Content-Type: application/gzip"             "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=vixor-erp-linux-x64.tar.gz"             --data-binary @vixor-erp-linux-x64.tar.gz 2>/dev/null)
          
          echo "$UPLOAD_RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print('✅ Uploaded:', d.get('browser_download_url','ERROR'))" 2>/dev/null || echo "Upload result: $UPLOAD_RESULT"    git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-linux-electron
          git add -f vixor-erp-linux-x64.tar.gz
          git commit -m "build: Vixor ERP ${{ github.ref_name }} Linux"
          git push --force origin build-desktop-linux-electron
