name: Desktop Build (Electron)

on:
  push:
    tags: ['v*']

defaults:
  run:
    working-directory: desktop-client

jobs:
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Push installer to git
        if: success()
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem desktop-client/dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; exit 1 }
          Write-Host "✅ $($exe.Name) — $([math]::Round($exe.Length/1MB,1)) MB"
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-win
          git add -f "$($exe.FullName)"
          git diff --cached --stat
          git commit -m "build: Vixor ERP ${{ github.ref_name }} Windows"
          git push --force origin build-desktop-win

  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .icns
        run: |
          mkdir -p VixorERP.iconset
          for sz in 16 32 128 256 512; do
            cp assets/icon_${sz}.png VixorERP.iconset/icon_${sz}x${sz}.png
          done
          iconutil -c icns VixorERP.iconset -o assets/icon.icns 2>/dev/null \
            || sips -s format icns assets/icon.png --out assets/icon.icns || true

      - name: npm install
        run: npm install

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Push DMG to git
        if: success()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find desktop-client/dist -name "*.dmg" | head -1)
          [ -z "$DMG" ] && echo "No DMG found" && exit 1
          SIZE=$(du -sh "$DMG" | cut -f1)
          echo "✅ $DMG — $SIZE"
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-mac
          git add -f "$DMG"
          git commit -m "build: Vixor ERP ${{ github.ref_name }} macOS"
          git push --force origin build-desktop-mac

  build-linux:
    name: Linux (tar.gz bundle)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        run: npm install

      - name: Build Linux
        run: npm run build:linux 2>&1 | tee /tmp/build-linux.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Save build log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B debug-electron-linux2
          cp /tmp/build-linux.log electron-build-error.txt 2>/dev/null || echo "npm install failed" > electron-build-error.txt
          git add -f electron-build-error.txt
          git commit -m "debug: electron linux error"
          git push --force origin debug-electron-linux2 || true

      - name: Package as tar.gz and push
        if: success()
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use dir output (not AppImage) → much smaller compressed
          # electron-builder dir target creates 'linux-unpacked' (no arch suffix)
          DIR=$(find desktop-client/dist -maxdepth 2 -type d \( -name "linux-unpacked" -o -name "linux-*" \) | head -1)
          if [ -z "$DIR" ]; then
            echo "No linux dir found. Contents of dist:"; ls -la desktop-client/dist/; exit 1
          fi
          echo "Packing $DIR..."
          tar -czf vixor-erp-linux-x64.tar.gz -C "$DIR" .
          SIZE=$(du -sh vixor-erp-linux-x64.tar.gz | cut -f1)
          echo "✅ vixor-erp-linux-x64.tar.gz — $SIZE"
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-linux-electron
          git add -f vixor-erp-linux-x64.tar.gz
          git commit -m "build: Vixor ERP ${{ github.ref_name }} Linux"
          git push --force origin build-desktop-linux-electron
