name: Desktop Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

defaults:
  run:
    working-directory: desktop-client

jobs:
  # ── Windows installer ───────────────────────────────────────────────────────
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-client/package.json

      - name: Install dependencies
        run: npm install

      - name: Generate icon.ico
        shell: pwsh
        run: |
          $src = "assets\icon_256.png"
          if (-not (Test-Path $src)) { $src = "assets\icon.png" }
          magick $src -define icon:auto-resize=256,128,64,48,32,16 assets\icon.ico
        continue-on-error: true

      - name: Build Windows installer
        run: npm run build:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true

      - uses: actions/upload-artifact@v4
        with:
          name: vixor-erp-windows
          path: desktop-client/dist/*.exe
          retention-days: 30


  # ── macOS DMG ───────────────────────────────────────────────────────────────
  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-client/package.json

      - name: Install dependencies
        run: npm install

      - name: Create icns from png
        run: |
          mkdir -p VixorERP.iconset
          for sz in 16 32 128 256 512; do
            cp assets/icon_${sz}.png VixorERP.iconset/icon_${sz}x${sz}.png
          done
          iconutil -c icns VixorERP.iconset -o assets/icon.icns 2>/dev/null || \
            sips -s format icns assets/icon.png --out assets/icon.icns || true

      - name: Build macOS DMG
        run: npm run build:mac -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: vixor-erp-macos
          path: desktop-client/dist/*.dmg
          retention-days: 30


  # ── Linux AppImage ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-client/package.json

      - name: Install dependencies
        run: npm install

      - name: Build Linux AppImage
        run: npm run build:linux -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: vixor-erp-linux
          path: desktop-client/dist/*.AppImage
          retention-days: 30

