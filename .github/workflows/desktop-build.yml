name: Desktop Build (Electron)

on:
  push:
    tags: ['v*']

defaults:
  run:
    working-directory: desktop-client

jobs:
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build & publish Linux
        run: |
          ELECTRON_PATH=$(node -e "console.log(require('electron'))" 2>/dev/null)
          [ -n "$ELECTRON_PATH" ] && export ELECTRON_OVERRIDE_DIST_PATH=$(dirname "$ELECTRON_PATH")
          npm run build:linux
        env:
          # GH_TOKEN enables electron-builder to auto-publish to GitHub Release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build & publish Windows
        shell: pwsh
        run: |
          try {
            $ep = node -e "console.log(require('electron'))" 2>$null
            if ($ep) { $env:ELECTRON_OVERRIDE_DIST_PATH = Split-Path $ep }
          } catch {}
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create .icns
        run: |
          mkdir -p VixorERP.iconset
          for sz in 16 32 128 256 512; do
            cp assets/icon_${sz}.png VixorERP.iconset/icon_${sz}x${sz}.png
          done
          iconutil -c icns VixorERP.iconset -o assets/icon.icns 2>/dev/null || true
      - run: npm install
      - name: Build & publish macOS
        run: |
          ELECTRON_PATH=$(node -e "console.log(require('electron'))" 2>/dev/null)
          [ -n "$ELECTRON_PATH" ] && export ELECTRON_OVERRIDE_DIST_PATH=$(dirname "$ELECTRON_PATH")
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
