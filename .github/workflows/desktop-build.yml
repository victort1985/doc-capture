name: Desktop Build (Electron)

on:
  push:
    tags: ['v*']

defaults:
  run:
    working-directory: desktop-client

jobs:
  build-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        run: |
          npm install
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Push to branch
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem desktop-client/dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No exe found in dist/"; exit 1 }
          Write-Host "Found: $($exe.Name) ($([math]::Round($exe.Length/1MB,1)) MB)"
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-win
          git add -f "$($exe.FullName)"
          git commit -m "build: windows ${{ github.ref_name }}"
          git push --force origin build-desktop-win

  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .icns
        run: |
          mkdir -p VixorERP.iconset
          for sz in 16 32 128 256 512; do
            cp assets/icon_${sz}.png VixorERP.iconset/icon_${sz}x${sz}.png
          done
          iconutil -c icns VixorERP.iconset -o assets/icon.icns 2>/dev/null \
            || sips -s format icns assets/icon.png --out assets/icon.icns || true

      - name: Install & build
        run: |
          npm install
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Push to branch
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find desktop-client/dist -name "*.dmg" | head -1)
          [ -z "$DMG" ] && echo "No DMG found" && exit 1
          echo "Found: $DMG ($(du -sh "$DMG" | cut -f1))"
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-mac
          git add -f "$DMG"
          git commit -m "build: macOS ${{ github.ref_name }}"
          git push --force origin build-desktop-mac

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        run: |
          npm install
          npm run build:linux 2>&1 | tee /tmp/build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_HTTP_TIMEOUT: 300000

      - name: Push to branch
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=$(find desktop-client/dist -name "*.AppImage" | head -1)
          [ -z "$APP" ] && cat /tmp/build.log | tail -20 && exit 1
          echo "Found: $APP ($(du -sh "$APP" | cut -f1))"
          cp "$APP" vixor-erp-linux.AppImage
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout -B build-desktop-linux-electron
          git add -f vixor-erp-linux.AppImage
          git commit -m "build: linux AppImage ${{ github.ref_name }}"
          git push --force origin build-desktop-linux-electron
