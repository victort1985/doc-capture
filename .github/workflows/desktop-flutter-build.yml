name: Desktop Flutter Build

on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev xz-utils libgcrypt20-dev \
            liblz4-dev libgpg-error-dev libsecret-1-dev libjsoncpp-dev

      - name: Download Flutter from Google (no Azure)
        run: |
          curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.4-stable.tar.xz \
            -o /tmp/flutter.tar.xz
          tar xf /tmp/flutter.tar.xz -C /tmp
          echo "/tmp/flutter/bin" >> $GITHUB_PATH

      - name: Flutter setup
        run: |
          flutter config --enable-linux-desktop --no-analytics
          flutter create --platforms=linux --project-name vixor_erp . 2>/dev/null || true

      - name: Patch app icon (Linux window/taskbar icon)
        run: |
          python3 -c "
          import re, traceback

          diag_lines = []
          def diag(s):
              diag_lines.append(s)
              print(s)

          try:
              path = 'linux/my_application.cc'
              diag('path=' + path)
              import os
              diag('exists=' + str(os.path.exists(path)))
              src = open(path).read()
              diag('file length=' + str(len(src)))

              icon_code = '''
                {
                  g_autofree gchar* exe_path = g_file_read_link(\"/proc/self/exe\", nullptr);
                  if (exe_path != nullptr) {
                    g_autofree gchar* exe_dir = g_path_get_dirname(exe_path);
                    g_autofree gchar* icon_path = g_build_filename(
                        exe_dir, \"data\", \"flutter_assets\", \"assets\", \"icons\", \"app_icon.png\", nullptr);
                    GError* icon_error = nullptr;
                    GdkPixbuf* icon = gdk_pixbuf_new_from_file(icon_path, &icon_error);
                    if (icon != nullptr) {
                      gtk_window_set_icon(window, icon);
                      g_object_unref(icon);
                    } else if (icon_error != nullptr) {
                      g_warning(\"Failed to load app icon: %s\", icon_error->message);
                      g_error_free(icon_error);
                    }
                  }
                }
              '''

              anchor = re.compile(r'GTK_WINDOW\(gtk_application_window_new\(GTK_APPLICATION\(application\)\)\);')
              m = anchor.search(src)
              diag('anchor_found=' + str(bool(m)))
              if m:
                  insert_at = m.end()
                  src = src[:insert_at] + icon_code + src[insert_at:]
                  open(path, 'w').write(src)
                  diag('PATCH APPLIED at offset ' + str(insert_at))
              else:
                  diag('ANCHOR NOT FOUND — dumping full source below for inspection')
                  diag('----- my_application.cc -----')
                  diag(src)
                  diag('----- end -----')
          except Exception:
              diag('EXCEPTION:')
              diag(traceback.format_exc())

          open('icon_patch_diag.txt', 'w').write(chr(10).join(diag_lines))
          "
          ls -la icon_patch_diag.txt 2>&1 || true

      - name: Patch pubspec & stubs
        run: |
          python3 -c "
          import re
          c = open('pubspec.yaml').read()
          for p in ['mobile_scanner','local_auth','http_parser']:
              c = re.sub(rf'^  {p}:.*$','',c,flags=re.MULTILINE)
          c = re.sub(r'\n  config:.*?(?=\n  [a-z]|\ndev_dependencies:|\Z)','',c,flags=re.DOTALL)
          open('pubspec.yaml','w').write(c)
          "
          cat > lib/services/biometric_service.dart << 'DART'
          class BiometricService {
            Future<bool> isAvailable() async => false;
            Future<bool> isEnabled() async => false;
            Future<void> setEnabled(bool v) async {}
            Future<bool> authenticate() async => true;
          }
          DART
          cat > lib/screens/barcode_scanner_screen.dart << 'DART'
          import 'package:flutter/material.dart';
          class BarcodeScannerScreen extends StatefulWidget {
            const BarcodeScannerScreen({super.key});
            @override State<BarcodeScannerScreen> createState() => _S();
          }
          class _S extends State<BarcodeScannerScreen> {
            final _c = TextEditingController();
            @override Widget build(BuildContext ctx) => Scaffold(
              appBar: AppBar(title: const Text('Enter barcode')),
              body: Padding(padding: const EdgeInsets.all(24), child: Column(
                mainAxisAlignment: MainAxisAlignment.center, children: [
                  const Icon(Icons.qr_code, size: 64, color: Colors.grey),
                  const SizedBox(height: 12),
                  TextField(controller: _c, autofocus: true,
                    decoration: const InputDecoration(labelText: 'Barcode', border: OutlineInputBorder()),
                    onSubmitted: (v) => Navigator.pop(ctx, v)),
                  const SizedBox(height: 12),
                  FilledButton(onPressed: () => Navigator.pop(ctx, _c.text), child: const Text('OK')),
                ],
              )),
            );
          }
          DART

          # Replace auth_service — flutter_secure_storage_windows fails on CI
          cat > lib/services/auth_service.dart << 'DART'
          import 'package:dio/dio.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'api_service.dart';

          class AuthUser {
            final int id;
            final String username;
            final String language;
            final String role;
            final int? organizationId;
            final List<int> allowedOrganizationIds;
            final Map<String, bool> permissions;
            final String? firstName;
            final String? lastName;

            AuthUser({required this.id, required this.username, required this.language,
              required this.role, this.organizationId,
              this.allowedOrganizationIds = const [], this.permissions = const {},
              this.firstName, this.lastName});

            bool hasPermission(String key) => permissions[key] ?? false;

            String get fullName {
              final f = firstName ?? '';
              final l = lastName ?? '';
              final full = '$f $l'.trim();
              return full.isNotEmpty ? full : username;
            }

            factory AuthUser.fromJson(Map<String, dynamic> j) => AuthUser(
              id: j['id'] as int, username: j['username'] as String,
              language: j['language'] as String? ?? 'he', role: j['role'] as String? ?? 'user',
              organizationId: j['organizationId'] as int?,
              allowedOrganizationIds: (j['allowedOrganizationIds'] as List<dynamic>?)
                  ?.map((e) => e as int).toList() ?? [],
              permissions: (j['permissions'] as Map<String, dynamic>?)
                  ?.map((k, v) => MapEntry(k, v as bool)) ?? {},
              firstName: j['firstName'] as String?,
              lastName: j['lastName'] as String?);
          }

          class AuthService {
            AuthService(this._api);
            final ApiService _api;
            Future<SharedPreferences> get _p => SharedPreferences.getInstance();

            Future<AuthUser> login(String u, String p) async {
              final r = await _api.post('/auth/login', {'username': u, 'password': p});
              final token = r['token'] as String? ?? r['access_token'] as String;
              (await _p).setString('auth_token', token); _api.setToken(token);
              return AuthUser.fromJson(r['user'] as Map<String, dynamic>);
            }
            Future<void> saveCredentials(String u, String pw) async {
              final p = await _p; p.setString('su', u); p.setString('sp', pw);
            }
            Future<(String, String)?> loadSavedCredentials() async {
              final p = await _p;
              final u = p.getString('su'); final pw = p.getString('sp');
              if (u == null || pw == null) return null; return (u, pw);
            }
            Future<void> clearSavedCredentials() async {
              final p = await _p; p.remove('su'); p.remove('sp');
            }
            Future<String?> restoreToken() async {
              final token = (await _p).getString('auth_token');
              if (token != null) _api.setToken(token); return token;
            }
            Future<AuthUser?> fetchCurrentUser() async {
              if (_api.token == null) return null;
              try {
                final r = await _api.get('/auth/me');
                return AuthUser.fromJson(r as Map<String, dynamic>);
              } on DioException catch (e) {
                if (e.response?.statusCode == 401) await logout(); return null;
              } catch (_) { return null; }
            }
            Future<void> logout() async { (await _p).remove('auth_token'); _api.setToken(null); }
          }
          DART
          find lib -name '*.dart' -exec sed -i 's/,\s*sharePositionOrigin:[^,)]*//' {} \;

      - name: pub get
        run: flutter pub get

      - name: Build Linux
        run: |
          export CXX=/usr/bin/clang++
          export CC=/usr/bin/clang
          flutter build linux --release 2>&1 | tee /tmp/build.log
          echo "Build exit: $?"

      - name: Package bundle
        run: |
          echo "=== build/linux tree ==="
          find build/linux -maxdepth 5 2>/dev/null | head -30
          echo "==="
          # Flutter 3.x: build/linux/x64/release/bundle/ OR build/linux/x64/release/
          BUNDLE=$(find build/linux -type d -name bundle 2>/dev/null | head -1)
          # Fallback: find the directory containing the vixor_erp binary
          if [ -z "$BUNDLE" ]; then
            BUNDLE=$(dirname "$(find build/linux -type f -name "vixor_erp" 2>/dev/null | head -1)" 2>/dev/null)
          fi
          if [ -z "$BUNDLE" ] || [ "$BUNDLE" = "." ]; then
            echo "Bundle not found!"
            exit 1
          fi
          echo "Bundle: $BUNDLE"
          ls -la "$BUNDLE"
          touch "$BUNDLE/test_marker.txt"
          echo "touch exit: $?"
          ls -la "$BUNDLE/test_marker.txt"
          grep -q "gtk_window_set_icon" linux/my_application.cc && echo "PATCHED=yes" > "$BUNDLE/icon_patch_diag.txt" || echo "PATCHED=no" > "$BUNDLE/icon_patch_diag.txt"
          cat linux/my_application.cc >> "$BUNDLE/icon_patch_diag.txt"
          ls -la "$BUNDLE/icon_patch_diag.txt"
          tar -czf /tmp/vixor-erp-linux-desktop.tar.gz -C "$BUNDLE" .
          echo "Size: $(du -sh /tmp/vixor-erp-linux-desktop.tar.gz)"

      - name: Push bundle to git (no Azure)
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          cp /tmp/vixor-erp-linux-desktop.tar.gz vixor-erp-linux-desktop.tar.gz
          echo "File size: $(du -sh vixor-erp-linux-desktop.tar.gz)"
          git checkout -B build-desktop-linux-flutter
          git add -f vixor-erp-linux-desktop.tar.gz
          git commit -m "build: linux desktop ${{ github.ref_name }}"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git build-desktop-linux-flutter
          echo "✅ Pushed"

  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter from Google (no Azure)
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.44.4-stable.zip"
          Write-Host "Downloading Flutter..."
          Invoke-WebRequest $url -OutFile "$env:TEMP\flutter.zip" -UseBasicParsing
          Write-Host "Extracting..."
          Expand-Archive "$env:TEMP\flutter.zip" -DestinationPath "C:\flutter-sdk" -Force
          echo "C:\flutter-sdk\flutter\bin" | Out-File -Append $env:GITHUB_PATH
          Write-Host "Flutter ready"

      - name: Flutter setup
        shell: pwsh
        run: |
          $env:PATH = "C:\flutter-sdk\flutter\bin;$env:PATH"
          flutter config --enable-windows-desktop --no-analytics
          flutter create --platforms=windows --project-name vixor_erp . 2>&1 | Out-Null || true

      - name: Patch pubspec & stubs
        shell: bash
        run: |
          python3 -c "
          import re
          c = open('pubspec.yaml').read()
          for p in ['mobile_scanner','local_auth','http_parser','geolocator','flutter_secure_storage','firebase_messaging','firebase_core','permission_handler']:
              c = re.sub(rf'^  {p}:.*$','',c,flags=re.MULTILINE)
          c = re.sub(r'\n  config:.*?(?=\n  [a-z]|\ndev_dependencies:|\Z)','',c,flags=re.DOTALL)
          open('pubspec.yaml','w').write(c)
          print('pubspec OK')
          "
          cat > lib/services/biometric_service.dart << 'DART'
          class BiometricService {
            Future<bool> isAvailable() async => false;
            Future<bool> isEnabled() async => false;
            Future<void> setEnabled(bool v) async {}
            Future<bool> authenticate() async => true;
          }
          DART
          cat > lib/screens/barcode_scanner_screen.dart << 'DART'
          import 'package:flutter/material.dart';
          class BarcodeScannerScreen extends StatefulWidget {
            const BarcodeScannerScreen({super.key});
            @override State<BarcodeScannerScreen> createState() => _S();
          }
          class _S extends State<BarcodeScannerScreen> {
            final _c = TextEditingController();
            @override Widget build(BuildContext ctx) => Scaffold(
              appBar: AppBar(title: const Text('Enter barcode')),
              body: Padding(padding: const EdgeInsets.all(24), child: Column(
                mainAxisAlignment: MainAxisAlignment.center, children: [
                  const Icon(Icons.qr_code, size: 64, color: Colors.grey),
                  const SizedBox(height: 12),
                  TextField(controller: _c, autofocus: true,
                    decoration: const InputDecoration(labelText: 'Barcode', border: OutlineInputBorder()),
                    onSubmitted: (v) => Navigator.pop(ctx, v)),
                  const SizedBox(height: 12),
                  FilledButton(onPressed: () => Navigator.pop(ctx, _c.text), child: const Text('OK')),
                ],
              )),
            );
          }
          DART

          # Replace auth_service — flutter_secure_storage_windows fails on CI
          cat > lib/services/auth_service.dart << 'DART'
          import 'package:dio/dio.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'api_service.dart';

          class AuthUser {
            final int id;
            final String username;
            final String language;
            final String role;
            final int? organizationId;
            final List<int> allowedOrganizationIds;
            final Map<String, bool> permissions;
            final String? firstName;
            final String? lastName;

            AuthUser({required this.id, required this.username, required this.language,
              required this.role, this.organizationId,
              this.allowedOrganizationIds = const [], this.permissions = const {},
              this.firstName, this.lastName});

            bool hasPermission(String key) => permissions[key] ?? false;

            String get fullName {
              final f = firstName ?? '';
              final l = lastName ?? '';
              final full = '$f $l'.trim();
              return full.isNotEmpty ? full : username;
            }

            factory AuthUser.fromJson(Map<String, dynamic> j) => AuthUser(
              id: j['id'] as int, username: j['username'] as String,
              language: j['language'] as String? ?? 'he', role: j['role'] as String? ?? 'user',
              organizationId: j['organizationId'] as int?,
              allowedOrganizationIds: (j['allowedOrganizationIds'] as List<dynamic>?)
                  ?.map((e) => e as int).toList() ?? [],
              permissions: (j['permissions'] as Map<String, dynamic>?)
                  ?.map((k, v) => MapEntry(k, v as bool)) ?? {},
              firstName: j['firstName'] as String?,
              lastName: j['lastName'] as String?);
          }

          class AuthService {
            AuthService(this._api);
            final ApiService _api;
            Future<SharedPreferences> get _p => SharedPreferences.getInstance();

            Future<AuthUser> login(String u, String p) async {
              final r = await _api.post('/auth/login', {'username': u, 'password': p});
              final token = r['token'] as String? ?? r['access_token'] as String;
              (await _p).setString('auth_token', token); _api.setToken(token);
              return AuthUser.fromJson(r['user'] as Map<String, dynamic>);
            }
            Future<void> saveCredentials(String u, String pw) async {
              final p = await _p; p.setString('su', u); p.setString('sp', pw);
            }
            Future<(String, String)?> loadSavedCredentials() async {
              final p = await _p;
              final u = p.getString('su'); final pw = p.getString('sp');
              if (u == null || pw == null) return null; return (u, pw);
            }
            Future<void> clearSavedCredentials() async {
              final p = await _p; p.remove('su'); p.remove('sp');
            }
            Future<String?> restoreToken() async {
              final token = (await _p).getString('auth_token');
              if (token != null) _api.setToken(token); return token;
            }
            Future<AuthUser?> fetchCurrentUser() async {
              if (_api.token == null) return null;
              try {
                final r = await _api.get('/auth/me');
                return AuthUser.fromJson(r as Map<String, dynamic>);
              } on DioException catch (e) {
                if (e.response?.statusCode == 401) await logout(); return null;
              } catch (_) { return null; }
            }
            Future<void> logout() async { (await _p).remove('auth_token'); _api.setToken(null); }
          }
          DART
          find lib -name '*.dart' -exec sed -i 's/,\s*sharePositionOrigin:[^,)]*//' {} \;

      - name: pub get
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        run: |
          # Show what packages remain
          Write-Host "=== pubspec dependencies ==="
          Get-Content pubspec.yaml | Select-String "^  \w"
          
          # Show what files might cause issues
          Write-Host "=== checking dart files for mobile imports ==="
          Get-ChildItem -Path lib -Filter "*.dart" -Recurse | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if ($content -match "geolocator|firebase|local_auth|mobile_scanner|secure_storage") {
              Write-Host "WARN: $($_.FullName)"
              Select-String -Path $_.FullName -Pattern "geolocator|firebase|local_auth|mobile_scanner|secure_storage"
            }
          }
          
          Write-Host "=== Starting flutter build ==="
          $buildOutput = flutter build windows --release 2>&1
          $exitCode = $LASTEXITCODE
          $buildOutput | Write-Host
          
          if ($exitCode -ne 0) {
            Write-Host "BUILD FAILED - saving errors to git"
            $buildOutput | Out-File -FilePath "windows-build-errors.txt" -Encoding utf8
            git config user.email "ci@doccapture.local"
            git config user.name "CI Bot"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -B debug-windows-build
            git add -f windows-build-errors.txt
            git commit -m "debug: windows build errors v${{ github.ref_name }}"
            git push --force origin debug-windows-build
            exit $exitCode
          }

      - name: Package & upload via GitHub API
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "$env:TEMP\vixor-erp-windows-desktop.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          $size = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Size: $size MB"
          
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title "Vixor ERP $tag" --notes "Auto build" 2>$null
          gh release upload $tag $zip --clobber --repo "${{ github.repository }}"
          Write-Host "✅ Uploaded to release $tag"
          # push_notifications_service.dart and create_call_screen.dart
          # already patched in repo — no additional stubs needed


