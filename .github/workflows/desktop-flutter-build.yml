name: Desktop Flutter Build

on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Create Linux platform files
        run: flutter create --platforms=linux . 2>/dev/null || true

      - name: flutter pub get
        run: flutter pub get

      - name: Patch mobile-only imports for desktop
        run: python3 ../.github/scripts/patch_desktop.py

      - name: Build Linux desktop
        run: flutter build linux --release 2>&1 | tee /tmp/build-linux-desktop.log

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../vixor-erp-linux-desktop.tar.gz .
          echo "Size: $(du -sh ../../../../vixor-erp-linux-desktop.tar.gz)"

      - uses: actions/upload-artifact@v4
        with:
          name: vixor-erp-linux-desktop
          path: mobile-client/build/vixor-erp-linux-desktop.tar.gz

      - name: Push to git branch
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git checkout -B build-desktop-linux-flutter
          git add -f mobile-client/build/vixor-erp-linux-desktop.tar.gz
          git commit -m "build: linux desktop flutter"
          git push --force origin build-desktop-linux-flutter

  build-windows:
    name: Windows Desktop
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create Windows platform files
        run: flutter create --platforms=windows . 2>&1 | Out-Null

      - name: flutter pub get
        run: flutter pub get

      - name: Patch mobile-only imports for desktop
        run: python3 ../.github/scripts/patch_desktop.py

      - name: Build Windows desktop
        run: flutter build windows --release

      - name: Package
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath build/vixor-erp-windows-desktop.zip
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: vixor-erp-windows-desktop
          path: mobile-client/build/vixor-erp-windows-desktop.zip
