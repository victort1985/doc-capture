name: Mobile client build

# Manual trigger any time from the Actions tab ("Run workflow"), plus
# automatic on version tags (v1.0.0 etc.) so tagging a release also
# produces downloadable builds attached to a GitHub Release.
on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server API base URL to bake into the build (e.g. https://doccapture.example.com/api). Leave empty to keep the https://app.doc-capture.app/api default.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # android/ isn't committed (see installation-guide.md, section 3.2) —
      # generate it fresh every build, same as a developer would locally.
      # --project-name is required: without it flutter infers the name from
      # the containing folder, and "mobile-client" has a hyphen, which is
      # not a valid Dart package name.
      - name: flutter create (android scaffolding)
        run: flutter create . --platforms=android --project-name doc_capture --org com.doccapture

      - name: Add Firebase config (google-services.json)
        run: cp ../.github/config/google-services.json android/app/google-services.json

      - name: Wire up Firebase Cloud Messaging plugin
        run: python3 ../.github/scripts/patch_android_firebase.py

      - name: Add camera + location permissions
        run: python3 ../.github/scripts/patch_android_manifest.py

      - name: Bump compileSdk/targetSdk to 36
        run: python3 ../.github/scripts/patch_android_sdk_version.py

      - name: Set server URL
        if: ${{ inputs.server_url != '' }}
        run: sed -i "s#https://app.doc-capture.app/api#${{ inputs.server_url }}#g" lib/services/api_service.dart

      - run: flutter pub get

      - name: Generate Operix app icons
        run: dart run flutter_launcher_icons

      - name: Bump file_picker's own compileSdk to 36
        run: python3 ../.github/scripts/patch_file_picker_sdk_version.py

      - name: flutter build apk --release
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build-android.log

      - name: Push diagnostic log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git checkout -B debug-logs-android
          mkdir -p .ci-debug
          cp /tmp/build-android.log .ci-debug/build-android.log
          git add -f .ci-debug/build-android.log
          git commit -m "debug: android build output"
          git push --force origin debug-logs-android

      - uses: actions/upload-artifact@v4
        with:
          name: doc-capture-android
          path: mobile-client/build/app/outputs/flutter-apk/app-release.apk
        continue-on-error: true

      # upload-artifact@v4 has been unreliable in this repo (intermittent
      # FinalizeArtifact failures, a known issue upstream) — push the APK
      # straight into the repo via git as a fallback delivery path that's
      # proven solid throughout this whole debugging session.
      - name: Push APK to git as a fallback delivery path
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git checkout -B build-android
          git add -f mobile-client/build/app/outputs/flutter-apk/app-release.apk
          git commit -m "build: android apk"
          git push --force origin build-android

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-client/build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: iOS IPA (unsigned)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Belt-and-suspenders alongside the pubspec.yaml
      # flutter: config: enable-swift-package-manager: false setting —
      # real-world CI evidence showed that setting alone is inconsistently
      # applied (one run succeeded, the very next failed with the exact
      # same 'requires a Development Team' error and the exact same SPM
      # warning still present, with no code change in between). Since
      # this pipeline runs a completely fresh `flutter create` every
      # time (ios/ isn't committed), setting it globally BEFORE that
      # scaffolding step ensures the generated Xcode project is never
      # SPM-wired in the first place, rather than hoping a later step
      # un-wires it based on the pubspec setting.
      - name: Disable Swift Package Manager globally (flutter_secure_storage doesn't support it yet)
        run: flutter config --no-enable-swift-package-manager

      # ios/ isn't committed either (installation-guide.md, section 4.2).
      - name: flutter create (ios scaffolding)
        run: flutter create . --platforms=ios --project-name doc_capture --org com.doccapture

      - name: Add camera + location usage descriptions
        run: python3 ../.github/scripts/patch_ios_plist.py

      - name: Bump iOS deployment target to 15.0 (firebase_core requirement)
        run: python3 ../.github/scripts/patch_ios_deployment_target.py

      - name: Set server URL
        if: ${{ inputs.server_url != '' }}
        run: sed -i '' "s#https://app.doc-capture.app/api#${{ inputs.server_url }}#g" lib/services/api_service.dart

      - run: flutter pub get

      - name: Generate Operix app icons
        run: dart run flutter_launcher_icons

      # Unsigned archive — no Apple Developer account is assumed here.
      # Sign it afterwards via Xcode Organizer or a resign service, exactly
      # as documented in installation-guide.md section 4.4.
      # `flutter build ipa --no-codesign` can produce an unsigned
      # .xcarchive, but the final archive -> .ipa export step always calls
      # Xcode's own `xcodebuild -exportArchive`, which requires a signing
      # team regardless of --no-codesign (see flutter/flutter#101765) — it
      # fails with "Development Team... Provisioning Profile" even here.
      # The standard workaround: build just the .app bundle and pack the
      # IPA's Payload/ folder by hand, skipping the export step entirely.
      - name: flutter build ios --no-codesign
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee /tmp/build-ios.log

      - name: Package Payload/*.ipa by hand
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../doc-capture-ios-unsigned.ipa Payload

      - name: Push diagnostic log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git checkout -B debug-logs-ios
          mkdir -p .ci-debug
          cp /tmp/build-ios.log .ci-debug/build-ios.log
          git add -f .ci-debug/build-ios.log
          git commit -m "debug: ios build output"
          git push --force origin debug-logs-ios

      - uses: actions/upload-artifact@v4
        with:
          name: doc-capture-ios-unsigned
          path: mobile-client/doc-capture-ios-unsigned.ipa
        continue-on-error: true

      - name: Push IPA to git as a fallback delivery path
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "ci@doccapture.local"
          git config user.name "CI Bot"
          git checkout -B build-ios
          git add -f mobile-client/doc-capture-ios-unsigned.ipa
          git commit -m "build: ios unsigned ipa"
          git push --force origin build-ios

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-client/doc-capture-ios-unsigned.ipa
