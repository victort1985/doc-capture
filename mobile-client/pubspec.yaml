name: vixor_erp
description: Vixor ERP — Field Service Management Platform
publish_to: 'none'
version: 1.0.38+138

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # Networking
  dio: ^5.4.3

  # Auth/token storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # State management
  provider: ^6.1.2

  # Camera & file pickers
  image_picker: ^1.1.2
  file_picker: ^8.0.6

  # Real-time notifications for the Calls feature
  socket_io_client: ^2.0.3+1

  # Optional "get my location" button on the call form
  geolocator: ^13.0.1

  # Tap-to-call: opens the phone's own dialer with a number pre-filled
  url_launcher: ^6.3.1

  # Real OS-level push notifications (home screen / locked phone) — the
  # in-app WebSocket popups only fire while the app is open. Android-only
  # for now: iOS push needs an Apple Developer Program membership (APNs)
  # that doesn't exist yet — see firebase_messaging_service.dart for how
  # this degrades safely on iOS without one.
  firebase_core: ^4.10.0
  firebase_messaging: ^16.4.0

  # firebase_messaging's own requestPermission() historically didn't
  # reliably trigger Android 13+'s POST_NOTIFICATIONS system dialog
  # (a real, long-documented FlutterFire issue — flutterfire#8720) —
  # using this instead for that specific permission is the well-
  # established reliable path, confirmed working across Android
  # versions regardless of which exact firebase_messaging release is
  # in use.
  permission_handler: ^12.0.3

  # Biometric login (Face ID / Touch ID on iOS, fingerprint on Android)
  local_auth: ^2.3.0

  # Shared organization calendar
  table_calendar: ^3.1.3

  # Management tab: warehouse PDF export + barcode camera scanner
  pdf: ^3.10.8
  printing: ^5.13.2
  mobile_scanner: ^7.0.1   # requires Flutter ≥3.29 — CI now runs 3.44.2 ✓
  share_plus: ^10.1.4       # share PDF via email/WhatsApp/etc
  http_parser: ^4.1.2       # MediaType for multipart uploads
  path_provider: ^2.1.3     # temp directory for share

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # enables flutter gen-l10n from l10n.yaml
  assets:
    - assets/icons/
